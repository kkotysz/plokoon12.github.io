<nav class="course-grid" aria-label="Nawigacja kursów">
  {% assign active_course = include.active %}
  {% for course in site.data.courses %}
    <a class="button course-button{% if course.id == active_course %} active{% endif %}" href="{{ course.href }}">
      <i class="{{ course.icon }}"></i>
      <span class="course-label{% if course.line_break %} multiline{% endif %}">{{ course.label }}</span>
    </a>
  {% endfor %}
</nav>
