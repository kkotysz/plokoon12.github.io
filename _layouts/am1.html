<!DOCTYPE html>
<html lang="pl">
<head>
  {% include course-head.html title="AM1" %}
</head>
<body class="course-page">
  <main class="page">
    <a class="home-link" href="/"><i class="fa-solid fa-house"></i> Strona główna</a>

    <header class="hero surface">
      <span class="tag"><i class="fa-solid fa-square-root-variable"></i> Analiza Matematyczna 1</span>
      <h1>Wyniki i podstawowe informacje</h1>
      <p class="lead">Wpisz numer albumu i pobierz swój wynik kolokwium.</p>
    </header>

    {% include course-switcher.html active="am1" %}

    <section class="section surface">
      <h2 class="section-title"><i class="fa-solid fa-chart-line"></i> Sprawdź wyniki</h2>
      <p class="section-desc">Numer albumu jest wymagany do pobrania danych.</p>

      <div class="results-panel">
        <div class="search-row">
          <div>
            <label class="field-label" for="id">Numer albumu</label>
            <input id="id" class="text-input" placeholder="Wpisz nr albumu">
          </div>
          <button class="action-btn" onclick="fetchResults()">Pobierz wyniki</button>
        </div>

        <div id="results"></div>
      </div>
    </section>
  </main>

  <script>
    async function fetchResults() {
      const id = document.getElementById("id").value;
      const apiURL = "https://student-results-worker.k-kotysz.workers.dev?id=" + encodeURIComponent(id) + "&course=am1";
      const resultsElem = document.getElementById("results");

      resultsElem.innerHTML = '<div class="state-note">Pobieram wyniki...</div>';

      try {
        const res = await fetch(apiURL);
        if (res.ok) {
          const data = await res.json();

          resultsElem.innerHTML =
            '<div class="results-card">' +
              '<h3 class="results-name">' + data.names + " " + data.surname + "<br>" + data.id + "</h3>" +
              '<p class="results-value"><strong>Wynik kolokwium:</strong> ' + data.kolokwium + "</p>" +
            "</div>";
        } else {
          resultsElem.innerHTML = '<div class="state-note error">Błąd: ' + await res.text() + "</div>";
        }
      } catch (err) {
        resultsElem.innerHTML = '<div class="state-note error">Błąd pobierania: ' + err.message + "</div>";
      }
    }
  </script>
</body>
</html>
